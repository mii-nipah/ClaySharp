name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ClaySharp.slnx

      - name: Build
        run: dotnet build ClaySharp.slnx -c Release --no-restore

      - name: Test
        run: dotnet test ClaySharp.Tests/ClaySharp.Tests.csproj -c Release --no-build

      - name: Pack ClaySharp
        run: dotnet pack ClaySharp/ClaySharp.csproj -c Release --no-build -o artifacts/packages

      - name: Pack ClaySharp.Raylib
        run: dotnet pack ClaySharp.Raylib/ClaySharp.Raylib.csproj -c Release --no-build -o artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
