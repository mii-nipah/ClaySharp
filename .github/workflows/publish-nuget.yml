name: Publish NuGet

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read package version
        id: package_version
        shell: bash
        run: |
          version=$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props)
          if [ -z "$version" ]; then
            echo "Could not find <Version> in Directory.Build.props" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check release tag
        shell: bash
        run: |
          tag="${{ steps.package_version.outputs.tag }}"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Release tag $tag already exists. Bump Directory.Build.props before publishing again." >&2
            exit 1
          fi

      - name: Restore
        run: dotnet restore ClaySharp.slnx

      - name: Build
        run: dotnet build ClaySharp.slnx -c Release --no-restore /p:Version=${{ steps.package_version.outputs.version }}

      - name: Test
        run: dotnet test ClaySharp.Tests/ClaySharp.Tests.csproj -c Release --no-build

      - name: Pack ClaySharp
        run: dotnet pack ClaySharp/ClaySharp.csproj -c Release --no-build -o artifacts/packages /p:Version=${{ steps.package_version.outputs.version }}

      - name: Pack ClaySharp.Raylib
        run: dotnet pack ClaySharp.Raylib/ClaySharp.Raylib.csproj -c Release --no-build -o artifacts/packages /p:Version=${{ steps.package_version.outputs.version }}

      - name: Publish packages
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets['NUGET_API_KEY'] }}
        run: |
          shopt -s nullglob

          if [ -z "$NUGET_API_KEY" ]; then
            echo "Missing NUGET_API_KEY secret" >&2
            exit 1
          fi

          for package in artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

          for symbols in artifacts/packages/*.snupkg; do
            dotnet nuget push "$symbols" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Tag release
        shell: bash
        run: |
          tag="${{ steps.package_version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.package_version.outputs.tag }}" \
            artifacts/packages/* \
            --title "${{ steps.package_version.outputs.tag }}" \
            --generate-notes
